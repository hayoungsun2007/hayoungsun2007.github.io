<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Cocoon— Ha Young Sun</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#ffffff;
    color:#111111;
}

a{
    color:#111111;
    text-decoration:none;
}

/* ---------- Header ---------- */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:30px 60px;
}

header a{
    font-size:15px;
    font-weight:500;
}

header a:hover{
    opacity:0.45;
}

/* ---------- Project Introduction ---------- */

.project-intro{
    min-height:70vh;

    display:flex;
    justify-content:space-between;
    align-items:flex-end;

    gap:80px;
    padding:80px;
}

.project-title h1{
    max-width:750px;

    font-size:48px;
    font-weight:500;
    line-height:1.05;
    letter-spacing:-1px;
}

.project-info{
    min-width:200px;

    font-size:15px;
    line-height:1.8;
    color:#555555;
}

/* ---------- Main Image ---------- */

.project-image{
    padding:0 80px 100px;
}

.project-image img{
    display:block;
    width:100%;
    height:auto;
}

/* ---------- Description ---------- */

.project-description{
    display:grid;
    grid-template-columns:1fr 2fr;
    gap:80px;

    padding:40px 80px 140px;
}

.project-description h2{
    font-size:16px;
    font-weight:500;
}

.project-description p{
    max-width:760px;

    font-size:18px;
    line-height:1.7;
    color:#444444;
}

/* ---------- Footer ---------- */

footer{
    display:flex;
    justify-content:space-between;

    padding:60px 80px;
    border-top:1px solid #dddddd;
}

footer a:hover{
    opacity:0.45;
}

/* ---------- Mobile ---------- */

@media (max-width:700px){

    header{
        padding:24px;
    }

    .project-intro{
        min-height:70vh;
        flex-direction:column;
        justify-content:flex-end;
        align-items:flex-start;

        gap:40px;
        padding:70px 24px;
    }

    .project-title h1{
        font-size:38px;
    }

    .project-image{
        padding:0 24px 70px;
    }

    .project-description{
        grid-template-columns:1fr;
        gap:30px;

        padding:20px 24px 100px;
    }

    footer{
        padding:40px 24px;
    }
}

</style>

</head>

<body>

<header>

    <a href="index.html">
        Ha Young Sun
    </a>

    <a href="index.html#projects">
        Projects
    </a>

</header>

<main>

    <section class="project-intro">

        <div class="project-title">

            <h1>The Cocoon</h1>

        </div>

        <div class="project-info">

            First-Year Studio<br>
            2025<br>
            Seoul National University

        </div>

    </section>

    <div class="project-image">

        <img
            src="parasitic-cover.jpg"
            alt="Parasitic Architecture Program"
        >

    </div>

    <section class="project-description">

        <h2>PROJECT</h2>

        <p>
            Project description will be added here.
        </p>

    </section>

</main>

<footer>

    <a href="index.html#projects">
        ← Projects
    </a>

    <span>
        The Cocoon
    </span>

</footer>

</body>

</html>
