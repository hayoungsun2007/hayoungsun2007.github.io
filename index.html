<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ha Young Sun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Arial, sans-serif;
    background:white;
    color:#111;
}

/* ---------- Landing ---------- */

.hero{
    height:100vh;

    display:flex;
    justify-content:flex-end;
    align-items:flex-end;

    padding:60px;
}

.hero a{
    text-decoration:none;
    color:#111;

    font-size:34px;
    font-weight:500;
    letter-spacing:0.5px;

    transition:opacity 0.25s;
}

.hero a:hover{
    opacity:0.4;
}

/* ---------- General Sections ---------- */

section{
    min-height:100vh;
    padding:80px;
}
#projects{
    padding-top:130px;
}
h2{
    font-size:18px;
    font-weight:500;
    margin-bottom:60px;
    letter-spacing:0.8px;
}



/* ---------- Projects ---------- */

.project-card{
    width:100%;
    max-width:1200px;
    margin:0 auto 100px;
}

.project-card a{
    display:block;
    color:#111;
    text-decoration:none;
}

.project-card img{
    display:block;
    width:88%;
    height:auto;
    object-fit:cover;

    transition:opacity 0.25s ease;
}
.project-info{
    display:flex;
    justify-content:space-between;
    align-items:baseline;

    width:88%;
    max-width:1200px;
    margin-top:8px auto 0;
}

.project-info h3{

    font-family:"Cormorant Garamond", serif;

    font-size:20px;

    font-style:italic;

    font-weight:500;

    letter-spacing:0;

    line-height:1.1;
}

.project-info p{
    font-size:15px;
    font-weight:400;
    color:#666;
}

.project-card a:hover img{
    opacity:0.75;
}

/* ---------- About & Contact ---------- */

.about{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    min-height:auto;
    padding-bottom:20px;
    gap:80px;
}

.about-column{
    width:40%;
}

.about-column h2{
    font-size:18px;
    font-weight:500;
    letter-spacing:0.8px;
    margin-bottom:30px;
}

.about-column p{
    font-size:17px;
    font-weight:400;
    line-height:2;
    color:#555;
}

.about-column a{
    color:#555;
    text-decoration:none;
    transition:opacity 0.2s;
}

.about-column a:hover{
    opacity:0.45;
}

/* ---------- Mobile ---------- */

@media (max-width:700px){

    .hero{
        padding:30px 24px;
    }

    .hero a{
        font-size:28px;
    }

    section{
        min-height:auto;
        padding:70px 24px;
    }
    .project-card img{
        width:100%;
    }

    .about{
    min-height:auto;
    flex-direction:column;
    justify-content:flex-start;
    align-items:flex-start;
    gap:70px;
    padding-bottom:20px;
}

    .about-column{
        width:100%;
    }
}

</style>

</head>

<body>

<div class="hero">

    <a href="#projects">
        Ha Young Sun
    </a>

</div>

<section id="projects">

    <h2>PROJECTS</h2>

    <article class="project-card">

        <a href="thecocoon.html">

            <img
                src="images/thecocoon-cover.jpg"
                alt="The Cocoon"
            >

            <div class="project-info">

                <h3>The Cocoon</h3>

                <p>2025</p>

            </div>

        </a>

    </article>

</section>

<section class="about">

    <div class="about-column">

        <h2>ABOUT</h2>

        <p>
            Architecture Student.<br>
            Researcher.<br>
            Occasional Essayist.
        </p>

    </div>

    <div class="about-column">

        <h2>CONTACT</h2>

        <p>
            <a href="mailto:hayoungs2007@gmail.com">
                hayoungs2007@gmail.com
            </a>

            <br>

            <a
                href="https://www.instagram.com/jalkkeyo/"
                target="_blank"
                rel="noopener noreferrer"
            >
                Instagram ->
            </a>
        </p>

    </div>

</section>

</body>

</html>
