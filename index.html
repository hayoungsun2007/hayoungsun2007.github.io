<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ha Young Sun</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Arial, sans-serif;
    background:white;
    color:#111;
}

/* ---------- Landing ---------- */

.hero{
    height:100vh;

    display:flex;
    justify-content:flex-end;
    align-items:flex-end;

    padding:60px;
}

.hero a{
    text-decoration:none;
    color:#111;

    font-size:34px;
    font-weight:500;
    letter-spacing:0.5px;

    transition:opacity 0.25s;
}

.hero a:hover{
    opacity:0.4;
}

/* ---------- General Sections ---------- */

section{
    min-height:100vh;
    padding:80px;
}

h2{
    font-size:18px;
    font-weight:500;
    margin-bottom:60px;
    letter-spacing:0.8px;
}

/* ---------- Projects ---------- */

.project{
    padding:50px 0;
    border-bottom:1px solid #ddd;
}

.project h3{
    font-size:22px;
    font-weight:500;
    margin-bottom:10px;
}

.project p{
    color:#666;
    font-size:17px;
    font-weight:400;
}

/* ---------- About & Contact ---------- */

.about{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;

    gap:80px;
}

.about-column{
    width:40%;
}

.about-column h2{
    font-size:18px;
    font-weight:500;
    letter-spacing:0.8px;
    margin-bottom:30px;
}

.about-column p{
    font-size:17px;
    font-weight:400;
    line-height:2;
    color:#555;
}

.about-column a{
    color:#555;
    text-decoration:none;
    transition:opacity 0.2s;
}

.about-column a:hover{
    opacity:0.45;
}

/* ---------- Mobile ---------- */

@media (max-width:700px){

    .hero{
        padding:30px 24px;
    }

    .hero a{
        font-size:28px;
    }

    section{
        min-height:auto;
        padding:70px 24px;
    }

    .about{
        min-height:100vh;
        flex-direction:column;
        justify-content:flex-end;
        align-items:flex-start;
        gap:70px;
    }

    .about-column{
        width:100%;
    }
}

</style>

</head>

<body>

<div class="hero">

    <a href="#projects">
        Ha Young Sun
    </a>

</div>

<section id="projects">

    <h2>Projects</h2>

    <div class="project">

        <h3>Project 01</h3>

        <p>Coming Soon</p>

    </div>

    <div class="project">

        <h3>Project 02</h3>

        <p>Coming Soon</p>

    </div>

</section>

<section class="about">

    <div class="about-column">

        <h2>ABOUT</h2>

        <p>
            Architecture Student.<br>
            Researcher.<br>
            Occasional Essayist.
        </p>

    </div>

    <div class="about-column">

        <h2>CONTACT</h2>

        <p>
            <a href="mailto:hayoungs2007@gmail.com">
                hayoungs2007@gmail.com
            </a>

            <br>

            <a
                href="https://www.instagram.com/jalkkeyo/"
                target="_blank"
                rel="noopener noreferrer"
            >
                Instagram ->
            </a>
        </p>

    </div>

</section>

</body>

</html>
